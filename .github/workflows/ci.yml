name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Implements the CI matrix in PROJECT_BUILD_PLAN.md §3:
#   OS:        ubuntu / macos / windows
#   Toolchain: stable / beta / MSRV (1.95.0)
#   Jobs:      build, test --all-features, test --no-default-features,
#              clippy -D warnings, fmt --check, cargo-deny, doc --no-deps,
#              dogfood (no assert!/unwrap()/expect() under crates/*/src/)
jobs:
  test:
    name: test / ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta, "1.95.0"]
    # RUSTUP_TOOLCHAIN overrides the pinned rust-toolchain.toml so the matrix
    # can exercise stable and beta as well as the MSRV.
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --all-targets
      - name: test (all features)
        run: cargo test --workspace --all-features
      - name: test (no default features)
        run: cargo test --workspace --no-default-features
      # The per-runtime `to_complete_within` crates are excluded from the
      # workspace (see the root Cargo.toml note) so their `tokio`/`async-std`/
      # `smol` features are never unified. Each is tested on its own here.
      - name: test (timeout / tokio)
        run: cargo test --manifest-path tests/timeout-tokio/Cargo.toml
      - name: test (timeout / async-std)
        run: cargo test --manifest-path tests/timeout-async-std/Cargo.toml
      - name: test (timeout / smol)
        run: cargo test --manifest-path tests/timeout-smol/Cargo.toml

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all --check

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # PROJECT_BUILD_PLAN.md Iteration 2.5: the workspace dogfoods its own API, so
  # no `assert!`, `assert_eq!`, `.unwrap()`, or `.expect(` may appear under any
  # crate's `src/`. Allowed under `tests/` and `examples/`.
  dogfood:
    name: dogfood
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-test-api.sh

  # PROJECT_BUILD_PLAN.md Iteration 10.1: every crate's public surface is
  # captured as a committed `public-api/<crate>.txt` snapshot. This job fails
  # if the live surface has drifted, so an unintended API change cannot land
  # without showing up in review.
  public-api:
    name: public-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-public-api --locked
      - run: ./scripts/check-public-api.sh

  # PROJECT_BUILD_PLAN.md Iteration 10.2: the prose guide in `book/` must build
  # with mdBook.
  book:
    name: book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install mdbook --locked
      - run: mdbook build book
