[book]
title = "The test-better Book"
description = "A guide to writing Result-returning Rust tests with test-better."
authors = ["Josh Burgess"]
language = "en"
src = "src"

# Render the HTML alongside Cargo's other build artifacts so the repo's
# `target/` ignore is enough; nothing leaks into `book/` itself.
[build]
build-dir = "../target/book"

[output.html]
default-theme = "rust"
git-repository-url = "https://github.com/joshburgess/test-better"
edit-url-template = "https://github.com/joshburgess/test-better/edit/main/book/{path}"
