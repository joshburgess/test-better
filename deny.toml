# cargo-deny configuration. Run with `cargo deny check`.

[advisories]
version = 2
# Fail on any security advisory or unmaintained crate. Add IDs to `ignore` only
# with a comment explaining why and a tracking entry in BACKLOG.md.
ignore = []

[licenses]
version = 2
# test-better is dual-licensed MIT OR Apache-2.0; only permissive licenses are
# allowed in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
# Duplicate versions are a warning, not an error: the dependency graph is small
# now, and a hard failure here would be noise. Revisit before 1.0.
multiple-versions = "warn"
wildcards = "deny"
# The internal dev-dependency cycles (e.g. `test-better-core` dev-depends on
# `test-better-matchers` for dogfooding) are declared as path-only deps with no
# `version` key. cargo drops a versionless path dev-dependency from the
# published manifest, which is what breaks the publish-order cycle; the price is
# that such a dep reads as a wildcard. Allow wildcards *only* when they are
# path dependencies, so real registry wildcards are still denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
